<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AR Audio Admin</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#3b82f6;--pri-h:#2563eb;
  --del:#ef4444;--del-h:#dc2626;
  --ok:#22c55e;--ok-h:#16a34a;
  --warn:#f59e0b;
  --bg:#f1f5f9;--sb:#ffffff;
  --bd:#e2e8f0;--bd2:#cbd5e1;
  --tx:#1e293b;--mu:#64748b;
  --sw:380px;
}
body{font:14px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--tx);background:var(--bg);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── Header ── */
#hdr{background:#0f172a;color:#f8fafc;flex-shrink:0;padding:0 12px}
#hdr-top{height:44px;display:flex;align-items:center;gap:10px}
#hdr-top h1{font-size:14px;font-weight:600;white-space:nowrap;letter-spacing:.02em}
#lang-btns{display:flex;gap:3px;overflow-x:auto;flex:1;scrollbar-width:none;padding:2px 0}
#lang-btns::-webkit-scrollbar{display:none}
.lang-btn{flex-shrink:0;padding:3px 9px;font-size:11px;font-weight:500;background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:4px;cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1.4}
.lang-btn:hover{background:#2d3f55;color:#e2e8f0}
.lang-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.lang-btn.has-all{border-color:#22c55e;color:#86efac}
.lang-btn.active.has-all{background:#16a34a;border-color:#16a34a;color:#fff}

/* ── Config warning ── */
#config-warn{display:none;background:#7c2d12;color:#fed7aa;font-size:12px;padding:6px 14px;flex-shrink:0;gap:8px;align-items:center}
#config-warn.show{display:flex}

/* ── Layout ── */
#body{display:flex;flex:1;overflow:hidden}
#map{flex:1;height:100%;z-index:1}

/* ── Sidebar ── */
#sidebar{width:var(--sw);background:var(--sb);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;z-index:2;box-shadow:-2px 0 8px rgba(0,0,0,.06)}
#view-list,#view-form{display:flex;flex-direction:column;height:100%;overflow:hidden}
#view-form{display:none}

/* list toolbar */
.sb-toolbar{padding:8px 10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px;flex-shrink:0}
.sb-toolbar .ttl{font-size:13px;font-weight:600;flex:1;color:var(--tx)}

/* add-mode banner */
#add-hint{padding:7px 12px;background:#fefce8;border-bottom:1px solid #fde047;display:none;align-items:center;gap:8px;flex-shrink:0}
#add-hint span{font-size:12px;color:#713f12;flex:1}

/* point list */
#point-list{flex:1;overflow-y:auto}
.point-item{padding:9px 12px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:10px}
.point-item:hover{background:#f8fafc}
.point-item.active{background:#eff6ff;border-left:3px solid var(--pri)}
.pi-dot{width:8px;height:8px;border-radius:50%;background:var(--del);flex-shrink:0}
.point-item.active .pi-dot{background:var(--pri)}
.pi-text{min-width:0;flex:1}
.pi-name{font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pi-info{font-size:11px;color:var(--mu);margin-top:1px}
.pi-lang-badge{font-size:10px;padding:1px 5px;border-radius:10px;background:#f1f5f9;border:1px solid var(--bd);color:var(--mu);flex-shrink:0;white-space:nowrap}
.pi-lang-badge.full{background:#dcfce7;border-color:#86efac;color:#166534}
.empty{padding:40px 20px;text-align:center;color:var(--mu);font-size:13px}

/* form */
.form-head{padding:8px 10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0}
.form-body{flex:1;overflow-y:auto;padding:12px 10px}
.form-foot{padding:8px 10px;border-top:1px solid var(--bd);flex-shrink:0}
.section{margin-bottom:16px}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mu);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.frow{margin-bottom:7px}
.frow label{display:block;font-size:11px;font-weight:600;color:var(--mu);margin-bottom:3px}
.frow input[type=text],.frow input[type=number],.frow textarea{width:100%;border:1px solid var(--bd);border-radius:5px;padding:6px 9px;font-size:13px;color:var(--tx);background:#fff;transition:border-color .15s,box-shadow .15s}
.frow input:focus,.frow textarea:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.frow textarea{resize:vertical;min-height:60px;font-family:inherit}
.frow-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* lang status grid */
.ls-grid{display:flex;flex-direction:column;gap:4px}
.ls-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:5px;background:#f8fafc;border:1px solid var(--bd)}
.ls-row.generated{border-color:#bbf7d0;background:#f0fdf4}
.ls-lang{width:70px;font-size:11px;font-weight:600;color:var(--tx);flex-shrink:0}
.ls-status{flex:1;font-size:11px}
.ls-status.ok{color:#15803d}
.ls-status.ng{color:var(--mu)}
.ls-actions{display:flex;gap:3px;flex-shrink:0}

/* Audio section */
.audio-card{display:flex;align-items:center;gap:8px;padding:7px 9px;background:#f8fafc;border:1px solid var(--bd);border-radius:6px;margin-bottom:7px}
.audio-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-ok{background:var(--ok)}
.dot-none{background:var(--bd2)}
.audio-name{flex:1;font-size:12px;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.audio-name.none{color:var(--mu)}
.upload-row{display:flex;align-items:center;gap:8px}
.upload-row input[type=file]{display:none}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:6px 12px;border-radius:5px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:background .15s,opacity .15s;white-space:nowrap;line-height:1}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-pri{background:var(--pri);color:#fff}.btn-pri:hover:not(:disabled){background:var(--pri-h)}
.btn-del{background:var(--del);color:#fff}.btn-del:hover:not(:disabled){background:var(--del-h)}
.btn-ok{background:var(--ok);color:#fff}.btn-ok:hover:not(:disabled){background:var(--ok-h)}
.btn-ghost{background:transparent;color:var(--tx);border:1px solid var(--bd2)}.btn-ghost:hover:not(:disabled){background:#f1f5f9}
.btn-sm{padding:4px 8px;font-size:12px}
.btn-xs{padding:2px 6px;font-size:11px}
.btn-full{width:100%;justify-content:center}

/* Progress overlay */
#progress-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000;display:none;align-items:center;justify-content:center}
#progress-overlay.show{display:flex}
#progress-box{background:#fff;border-radius:10px;padding:28px 32px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
#progress-title{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:16px}
.prog-bar-wrap{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-bottom:10px}
#prog-bar{height:100%;background:var(--pri);border-radius:4px;transition:width .3s;width:0}
#progress-detail{font-size:12px;color:var(--mu);min-height:16px}

/* toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#f8fafc;padding:8px 18px;border-radius:6px;font-size:13px;pointer-events:none;opacity:0;transition:opacity .2s;z-index:9999}
#toast.show{opacity:1}

/* map follow toggle */
#follow-btn{position:absolute;bottom:30px;left:14px;z-index:1000;background:#fff;border:2px solid rgba(0,0,0,.2);border-radius:6px;padding:5px 9px;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.2);transition:background .15s}
#follow-btn.following{background:#3b82f6;color:#fff;border-color:#3b82f6}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-top">
    <h1>AR音声管理</h1>
    <div id="lang-btns"></div>
  </div>
</div>
<div id="config-warn">
  <span>⚠️</span><span id="config-warn-msg"></span>
</div>

<div id="body">
  <div id="map">
    <button id="follow-btn" class="following" onclick="toggleFollowMode()" title="現在地追従のON/OFF">📍 追従中</button>
  </div>
  <aside id="sidebar">

    <!-- List View -->
    <div id="view-list">
      <div class="sb-toolbar">
        <span class="ttl">地点リスト</span>
        <button class="btn btn-ghost btn-sm" onclick="cleanupOrphans()" title="未使用mp3を削除">🧹</button>
        <button class="btn btn-pri btn-sm" id="btn-add" onclick="startAddMode()">+ 追加</button>
      </div>
      <div id="add-hint">
        <span>地図をクリックして追加</span>
        <button class="btn btn-ghost btn-xs" onclick="stopAddMode()">キャンセル</button>
      </div>
      <div id="point-list"></div>
    </div>

    <!-- Form View -->
    <div id="view-form">
      <div class="form-head">
        <button class="btn btn-ghost btn-sm" onclick="showList()">← 戻る</button>
        <span style="flex:1"></span>
        <button class="btn btn-del btn-sm" id="btn-del" onclick="confirmDelete()">削除</button>
      </div>
      <div class="form-body" id="form-body"></div>
      <div class="form-foot">
        <button class="btn btn-pri btn-full" id="btn-save" onclick="savePoint()">保存</button>
      </div>
    </div>

  </aside>
</div>

<!-- Progress overlay -->
<div id="progress-overlay">
  <div id="progress-box">
    <div id="progress-title">音声を生成中...</div>
    <div class="prog-bar-wrap"><div id="prog-bar"></div></div>
    <div id="progress-detail"></div>
  </div>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Language definitions ───────────────────────────────────────────────────────
const LANGS = [
  {code:'ja',    name:'日本語'},
  {code:'en',    name:'English'},
  {code:'zh-CN', name:'中文简体'},
  {code:'zh-TW', name:'中文繁體'},
  {code:'ko',    name:'한국어'},
  {code:'es',    name:'Español'},
  {code:'fr',    name:'Français'},
  {code:'it',    name:'Italiano'},
  {code:'de',    name:'Deutsch'},
  {code:'pt',    name:'Português'},
  {code:'th',    name:'ภาษาไทย'},
  {code:'vi',    name:'Tiếng Việt'},
];

// ── State ──────────────────────────────────────────────────────────────────────
let currentLang = 'ja';
let points = [], langStatus = {}, editing = null, addMode = false;
let map, markers = {}, circles = {};
let vehicleMarker = null, vehicleAccCircle = null;
let followMode = true;   // auto-follow GPS position

// ── Map ────────────────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map').setView([35.68, 139.76], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19,
  }).addTo(map);
  map.on('click', onMapClick);
}

const vehicleIcon = L.divIcon({
  html: '<div style="font-size:26px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))">🚌</div>',
  className: '',
  iconSize: [30, 30],
  iconAnchor: [15, 15],
  popupAnchor: [0, -15],
});

function initGeolocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(
    pos => {
      const latlng = [pos.coords.latitude, pos.coords.longitude];
      if (!vehicleMarker) {
        vehicleMarker = L.marker(latlng, {icon: vehicleIcon, zIndexOffset: 2000})
          .bindTooltip('現在地', {direction: 'top', offset: [0, -12], permanent: false})
          .addTo(map);
        if (pos.coords.accuracy) {
          vehicleAccCircle = L.circle(latlng, {
            radius: pos.coords.accuracy,
            color: '#3b82f6', fillColor: '#3b82f6',
            fillOpacity: 0.08, weight: 1, dashArray: '4',
          }).addTo(map);
        }
        // First fix: always center on vehicle
        map.setView(latlng, Math.max(map.getZoom(), 16));
      } else {
        vehicleMarker.setLatLng(latlng);
        if (vehicleAccCircle) {
          vehicleAccCircle.setLatLng(latlng);
          if (pos.coords.accuracy) vehicleAccCircle.setRadius(pos.coords.accuracy);
        }
        // Auto-follow only when not editing a point
        if (followMode && !editing) {
          map.panTo(latlng);
        }
      }
    },
    err => console.warn('Geolocation:', err.message),
    {enableHighAccuracy: true, maximumAge: 3000, timeout: 15000}
  );
  // Manual drag disables follow mode
  map.on('dragstart', () => {
    if (followMode) {
      followMode = false;
      updateFollowButton();
    }
  });
}

function toggleFollowMode() {
  followMode = !followMode;
  updateFollowButton();
  if (followMode && vehicleMarker) {
    map.panTo(vehicleMarker.getLatLng());
  }
}

function updateFollowButton() {
  const btn = document.getElementById('follow-btn');
  if (!btn) return;
  if (followMode) {
    btn.textContent = '📍 追従中';
    btn.classList.add('following');
  } else {
    btn.textContent = '🗺 手動';
    btn.classList.remove('following');
  }
}

function makeIcon(color, size = 14) {
  return L.divIcon({
    html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>`,
    className: '', iconSize: [size, size], iconAnchor: [size / 2, size / 2],
  });
}

function renderMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  Object.values(circles).forEach(c => map.removeLayer(c));
  markers = {}; circles = {};
  points.forEach(p => {
    const sel = editing && editing.id === p.id;
    const color = sel ? '#3b82f6' : '#ef4444';
    const m = L.marker([p.latitude, p.longitude], {
      icon: makeIcon(color, sel ? 16 : 12),
      title: p.name,
      draggable: sel,
      zIndexOffset: sel ? 1000 : 0,
    }).addTo(map).on('click', () => selectPoint(p.id));
    if (sel) {
      m.on('drag', e => {
        const {lat, lng} = e.target.getLatLng();
        const fi = document.getElementById('f-lat');
        const fj = document.getElementById('f-lon');
        if (fi) fi.value = lat.toFixed(6);
        if (fj) fj.value = lng.toFixed(6);
        circles[p.id]?.setLatLng([lat, lng]);
      });
    }
    const c = L.circle([p.latitude, p.longitude], {
      radius: p.radius, color, fillColor: color,
      fillOpacity: .12, weight: sel ? 2 : 1.5,
    }).addTo(map);
    markers[p.id] = m; circles[p.id] = c;
  });
}

function onMapClick(e) {
  if (!addMode) return;
  stopAddMode();
  openForm(null, e.latlng.lat, e.latlng.lng);
}

// ── Add mode ───────────────────────────────────────────────────────────────────
function startAddMode() {
  addMode = true;
  document.getElementById('add-hint').style.display = 'flex';
  document.getElementById('btn-add').disabled = true;
  map.getContainer().style.cursor = 'crosshair';
}
function stopAddMode() {
  addMode = false;
  document.getElementById('add-hint').style.display = 'none';
  document.getElementById('btn-add').disabled = false;
  map.getContainer().style.cursor = '';
}

// ── Config check ───────────────────────────────────────────────────────────────
async function checkConfig() {
  try {
    const r = await fetch('/api/config_status');
    const {openai, google_tts} = await r.json();
    const missing = [];
    if (!openai) missing.push('OPENAI_API_KEY');
    if (!google_tts) missing.push('GOOGLE_TTS_KEY');
    const warn = document.getElementById('config-warn');
    if (missing.length) {
      document.getElementById('config-warn-msg').textContent =
        `環境変数が未設定のため音声生成が利用できません: ${missing.join('、')}`;
      warn.classList.add('show');
    } else {
      warn.classList.remove('show');
    }
  } catch(e) {
    console.warn('config_status check failed:', e);
  }
}

// ── Language buttons ───────────────────────────────────────────────────────────
function buildLangButtons() {
  const container = document.getElementById('lang-btns');
  container.innerHTML = LANGS.map(l => {
    const allGen = points.length > 0 && points.every(p => langStatus[p.id]?.[l.code]);
    const isActive = currentLang === l.code;
    return `<button class="lang-btn${isActive ? ' active' : ''}${allGen ? ' has-all' : ''}"
      data-lang="${l.code}" onclick="switchLang('${l.code}')">${l.name}</button>`;
  }).join('');
}

async function switchLang(lang) {
  currentLang = lang;
  buildLangButtons();

  // Find points whose mp3 for this language is missing
  await refreshLangStatus();
  const needGen = points.filter(p => {
    if (!p.id) return false;
    if (langStatus[p.id]?.[lang]) return false;   // mp3 already exists
    return !!((p.tts_texts?.ja || '').trim());     // has source text
  });

  // Generate missing mp3s with progress overlay
  if (needGen.length > 0) {
    showProgress(lang, 0, needGen.length);
    let succeeded = 0;
    for (let i = 0; i < needGen.length; i++) {
      const p = needGen[i];
      updateProgress(i + 1, needGen.length, p.name);
      try {
        const r = await fetch(
          `/api/points/${p.id}/generate/${encodeURIComponent(lang)}`, {method: 'POST'}
        );
        if (r.ok) succeeded++;
        else console.warn(`generate ${lang} ${p.id}:`, (await r.json().catch(()=>({}))).detail);
      } catch(e) { console.error('generate error:', e); }
    }
    hideProgress();
  }

  // Set language.yaml AND update audio_file pointers for all points in one call.
  // This is what makes the "現在の音声ファイル" section switch immediately.
  await fetch(`/api/language?lang=${encodeURIComponent(lang)}`, {method: 'PUT'});

  // Refresh all point data (including updated audio_file) and rebuild UI
  await refreshPoints();

  const msg = needGen.length > 0
    ? `${lang} 音声生成・切り替え完了`
    : `${lang} に切り替えました`;
  toast(msg, 'ok');
}

// ── Data loading ───────────────────────────────────────────────────────────────
async function refreshPoints() {
  const r = await fetch('/api/points');
  points = await r.json();
  await refreshLangStatus();
  renderList();
  renderMarkers();
  buildLangButtons();
  if (editing) {
    const updated = points.find(p => p.id === editing.id);
    if (updated) { editing = updated; buildForm(updated); }
  }
  if (points.length && !editing) {
    map.fitBounds(points.map(p => [p.latitude, p.longitude]), {padding: [40, 40], maxZoom: 16});
  }
}

async function refreshLangStatus() {
  const r = await fetch('/api/lang_status?t=' + Date.now());
  langStatus = await r.json();
}

// ── List ───────────────────────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('point-list');
  if (!points.length) {
    el.innerHTML = '<div class="empty">地点がありません<br>地図上をクリックして追加</div>';
    return;
  }
  el.innerHTML = points.map(p => {
    const st = langStatus[p.id] || {};
    const genCount = Object.values(st).filter(Boolean).length;
    const full = genCount === LANGS.length;
    return `
    <div class="point-item${editing && editing.id === p.id ? ' active' : ''}" onclick="selectPoint('${p.id}')">
      <div class="pi-dot"></div>
      <div class="pi-text">
        <div class="pi-name">${h(p.name)}</div>
        <div class="pi-info">${p.latitude.toFixed(5)}, ${p.longitude.toFixed(5)} · r=${p.radius}m</div>
      </div>
      <span class="pi-lang-badge${full ? ' full' : ''}">${genCount}/${LANGS.length}🔊</span>
    </div>`;
  }).join('');
}

// ── Form ───────────────────────────────────────────────────────────────────────
function selectPoint(id) {
  const p = points.find(x => x.id === id);
  if (!p) return;
  editing = p;
  openForm(p);
  map.panTo([p.latitude, p.longitude]);
  renderMarkers();
  renderList();
}

function openForm(point, defLat, defLon) {
  editing = point;
  // Disable auto-follow during editing to avoid map jumping while dragging marker
  if (point) { followMode = false; updateFollowButton(); }
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-form').style.display = 'flex';
  document.getElementById('btn-del').style.display = point ? '' : 'none';
  const p = point || {
    id: null, name: '', latitude: defLat || 35.68, longitude: defLon || 139.76,
    radius: 10, tts_texts: {}, audio_file: null, audio_files: {},
  };
  buildForm(p);
}

function buildForm(p) {
  const jaText = (p.tts_texts || {}).ja || '';
  const audioCard = p.audio_file
    ? `<div class="audio-card">
         <div class="audio-dot dot-ok"></div>
         <span class="audio-name">${h(p.audio_file)}</span>
         <button class="btn btn-ghost btn-xs" onclick="previewAudio('${h(p.audio_file)}')">▶ 試聴</button>
       </div>`
    : `<div class="audio-card">
         <div class="audio-dot dot-none"></div>
         <span class="audio-name none">音声ファイルなし</span>
       </div>`;

  document.getElementById('form-body').innerHTML = `
    <div class="section">
      <div class="frow">
        <label>名前</label>
        <input type="text" id="f-name" value="${h(p.name)}" placeholder="地点名">
      </div>
      <div class="frow">
        <label>半径 (m)</label>
        <input type="number" id="f-radius" value="${p.radius}" min="1" step="1">
      </div>
      <div class="frow-2">
        <div class="frow">
          <label>緯度</label>
          <input type="number" id="f-lat" value="${p.latitude}" step="0.000001">
        </div>
        <div class="frow">
          <label>経度</label>
          <input type="number" id="f-lon" value="${p.longitude}" step="0.000001">
        </div>
      </div>
      <div style="font-size:11px;color:var(--mu);margin-top:2px">💡 マーカーをドラッグして位置を変更</div>
    </div>

    <div class="section">
      <div class="section-title">日本語テキスト
        <span style="font-size:10px;font-weight:400;text-transform:none;color:var(--mu)">(自動翻訳の元テキスト)</span>
      </div>
      <div class="frow">
        <textarea id="f-ja-text" placeholder="日本語でガイドテキストを入力...">${h(jaText)}</textarea>
      </div>
    </div>

    <div class="section">
      <div class="section-title">
        言語別音声ファイル
        <button class="btn btn-pri btn-xs" onclick="generateAllMissing()" style="margin-left:auto">
          全言語を生成
        </button>
      </div>
      <div class="ls-grid" id="lang-status-grid"></div>
    </div>

    <div class="section">
      <div class="section-title">現在の音声ファイル</div>
      ${audioCard}
      <div class="upload-row" style="margin-top:6px">
        <label for="f-upload" class="btn btn-ghost btn-sm">📁 アップロード</label>
        <input type="file" id="f-upload" accept="audio/*" onchange="uploadAudio(this)">
        <span id="upload-status" style="font-size:11px;color:var(--mu)"></span>
      </div>
    </div>`;

  buildLangStatusGrid(p);
}

function buildLangStatusGrid(p) {
  if (!p) return;
  const st = langStatus[p.id] || {};
  const hasJaText = !!(p.tts_texts?.ja || '').trim();
  const hasId = !!p.id;

  const rows = LANGS.map(l => {
    const exists = st[l.code] === true;
    const fname = `${p.id}_${l.code}.mp3`;
    const canAct = hasJaText && hasId;
    return `
      <div class="ls-row${exists ? ' generated' : ''}">
        <span class="ls-lang">${h(l.name)}</span>
        <span class="ls-status${exists ? ' ok' : ' ng'}">${exists ? '✅ 生成済み' : '⏳ 未生成'}</span>
        <div class="ls-actions">
          ${exists ? `<button class="btn btn-xs btn-ghost" onclick="previewAudio('${h(fname)}')" title="試聴">▶</button>` : ''}
          <button class="btn btn-xs btn-ghost" id="btn-regen-${l.code}"
            onclick="regenerateAudio('${l.code}')"
            ${canAct ? '' : 'disabled'}
            title="${exists ? '再生成' : '生成'}">再生成</button>
        </div>
      </div>`;
  }).join('');

  const grid = document.getElementById('lang-status-grid');
  if (grid) grid.innerHTML = rows;
}

function showList() {
  editing = null;
  followMode = true;   // re-enable follow when leaving edit view
  updateFollowButton();
  document.getElementById('view-list').style.display = 'flex';
  document.getElementById('view-form').style.display = 'none';
  renderMarkers();
  renderList();
}

// ── Save ───────────────────────────────────────────────────────────────────────
async function savePoint(silent = false) {
  const btn = document.getElementById('btn-save');
  const name = (document.getElementById('f-name')?.value || '').trim();
  const lat = parseFloat(document.getElementById('f-lat')?.value);
  const lon = parseFloat(document.getElementById('f-lon')?.value);
  const radius = parseFloat(document.getElementById('f-radius')?.value) || 10;
  const jaText = (document.getElementById('f-ja-text')?.value || '').trim();

  if (!name) { toast('名前は必須です', 'del'); return null; }

  const tts_texts = jaText ? {ja: jaText} : {};

  if (btn) btn.disabled = true;
  try {
    const body = {
      name, latitude: lat, longitude: lon, radius, tts_texts,
      audio_file: editing?.audio_file || null,
      audio_files: editing?.audio_files || {},
    };
    let saved;
    if (editing?.id) {
      const r = await fetch(`/api/points/${editing.id}`, {
        method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
      saved = await r.json();
    } else {
      const r = await fetch('/api/points', {
        method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
      saved = await r.json();
    }
    editing = saved;
    const idx = points.findIndex(p => p.id === saved.id);
    if (idx >= 0) points[idx] = saved; else points.push(saved);
    await refreshLangStatus();
    if (!silent) {
      renderList(); renderMarkers(); buildForm(saved);
      buildLangButtons();
      toast('保存しました', 'ok');
    }
    return saved;
  } catch(e) {
    toast('保存エラー: ' + e.message, 'del');
    return null;
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function confirmDelete() {
  if (!editing?.id) return;
  if (!confirm('この地点を削除しますか？\n関連する全ての音声ファイルも削除されます。')) return;
  const r = await fetch(`/api/points/${editing.id}`, {method: 'DELETE'});
  if (!r.ok) { toast('削除に失敗しました', 'del'); return; }
  editing = null;
  await refreshPoints();
  showList();
  toast('削除しました', 'ok');
}

// ── Per-language regeneration (always force) ───────────────────────────────────
async function regenerateAudio(lang) {
  if (!editing?.id) {
    const saved = await savePoint(true);
    if (!saved) return;
  }
  const pid = editing.id;
  const btn = document.getElementById(`btn-regen-${lang}`);
  if (btn) { btn.disabled = true; btn.textContent = '生成中...'; }
  try {
    const r = await fetch(`/api/points/${pid}/regenerate/${encodeURIComponent(lang)}`, {method: 'POST'});
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    // Refresh points and rebuild form/status
    const pr = await fetch('/api/points');
    points = await pr.json();
    await refreshLangStatus();
    const updated = points.find(p => p.id === pid);
    if (updated) { editing = updated; buildForm(updated); }
    buildLangButtons();
    renderList();
    toast(`${lang} の音声を生成しました`, 'ok');
  } catch(e) {
    toast('生成エラー: ' + e.message, 'del');
    if (btn) { btn.disabled = false; btn.textContent = '再生成'; }
  }
}

// ── Bulk generate all missing languages for current point ──────────────────────
async function generateAllMissing() {
  if (!editing?.id) {
    const saved = await savePoint(true);
    if (!saved) return;
  }
  const pid = editing.id;
  const st = langStatus[pid] || {};
  const jaText = (editing.tts_texts?.ja || '').trim();
  const missing = LANGS.filter(l => !st[l.code] && jaText);

  if (!missing.length) { toast('全言語生成済みです', 'ok'); return; }

  showProgress('全言語', 0, missing.length);
  let ok = 0;
  for (let i = 0; i < missing.length; i++) {
    const l = missing[i];
    updateProgress(i + 1, missing.length, l.name);
    try {
      const r = await fetch(`/api/points/${pid}/generate/${encodeURIComponent(l.code)}`, {method: 'POST'});
      if (r.ok) {
        langStatus[pid] = langStatus[pid] || {};
        langStatus[pid][l.code] = true;
        ok++;
      } else {
        const e = await r.json().catch(() => ({}));
        console.warn(`generate ${l.code}:`, e.detail || 'error');
      }
    } catch(e) { console.error(e); }
  }
  hideProgress();

  const pr = await fetch('/api/points');
  points = await pr.json();
  await refreshLangStatus();
  const updated = points.find(p => p.id === pid);
  if (updated) { editing = updated; buildForm(updated); }
  buildLangButtons();
  renderList();
  toast(`全言語生成完了 (${ok}/${missing.length})`, 'ok');
}

// ── Audio helpers ──────────────────────────────────────────────────────────────
function previewAudio(fname) {
  new Audio(`/audio/${fname}`).play().catch(e => toast('再生エラー: ' + e.message, 'del'));
}

async function uploadAudio(input) {
  if (!input.files.length) return;
  if (!editing?.id) {
    const saved = await savePoint(true);
    if (!saved) { input.value = ''; return; }
  }
  const st = document.getElementById('upload-status');
  if (st) st.textContent = 'アップロード中...';
  const fd = new FormData();
  fd.append('file', input.files[0]);
  try {
    const r = await fetch(`/api/points/${editing.id}/upload`, {method: 'POST', body: fd});
    if (!r.ok) throw new Error((await r.json()).detail || r.statusText);
    const pr = await fetch('/api/points');
    points = await pr.json();
    const updated = points.find(p => p.id === editing.id);
    if (updated) { editing = updated; buildForm(updated); }
    renderList();
    toast('アップロードしました', 'ok');
  } catch(e) {
    toast('Upload: ' + e.message, 'del');
  } finally {
    if (st) st.textContent = '';
    input.value = '';
  }
}

// ── Cleanup orphans ────────────────────────────────────────────────────────────
async function cleanupOrphans() {
  if (!confirm('ar_points.yamlに存在しない地点のmp3ファイルを削除します。\nよろしいですか？')) return;
  try {
    const r = await fetch('/api/cleanup_orphans', {method: 'POST'});
    const d = await r.json();
    toast(d.count === 0 ? '削除対象なし' : `${d.count}件削除しました`, 'ok');
  } catch(e) {
    toast('クリーンアップエラー: ' + e.message, 'del');
  }
}

// ── Progress overlay ───────────────────────────────────────────────────────────
function showProgress(label, cur, total) {
  document.getElementById('progress-title').textContent = `${label} の音声を生成中...`;
  document.getElementById('prog-bar').style.width = '0%';
  document.getElementById('progress-detail').textContent = `0 / ${total}`;
  document.getElementById('progress-overlay').classList.add('show');
}
function updateProgress(cur, total, name) {
  document.getElementById('prog-bar').style.width = Math.round(cur / total * 100) + '%';
  document.getElementById('progress-detail').textContent = `${h(name)} (${cur} / ${total})`;
}
function hideProgress() {
  document.getElementById('progress-overlay').classList.remove('show');
}

// ── Toast ──────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type === 'del' ? '#ef4444' : '#1e293b';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Utils ──────────────────────────────────────────────────────────────────────
function h(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ───────────────────────────────────────────────────────────────────────
async function init() {
  initMap();
  initGeolocation();
  await checkConfig();
  try {
    const r = await fetch('/api/language');
    const d = await r.json();
    currentLang = d.language || 'ja';
  } catch(e) {
    console.warn('language load failed:', e);
  }
  await refreshPoints();
  buildLangButtons();
}

init();
</script>
</body>
</html>
