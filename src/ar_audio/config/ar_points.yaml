- name: 高輪ゲートウェイシティー
  latitude: 35.63538609590601
  longitude: 139.74024921655655
  audio_file: 48b2956a_ja.mp3
  radius: 30.0
  tts_texts:
    ja: '高輪ゲートウェイシティーです。ひと、自然、テクノロジーをつなぎ、

      世界で最も生命力が溢れる街へ。


      150年以上前、日本ではじめての鉄道が海の上を走った、イノベーションの地。

      明治時代には車両基地として、日本の発展を支えました。

      ここ高輪の地で、JR東日本最大のまちづくりを推進しています。

      街を100年先の心豊かなくらしのための実験場と位置付け、多様なパートナー、周辺地域の方々との共創によるまちづくりを進めています。'
  audio_files:
    ja: 48b2956a_ja.mp3
  id: 48b2956a
